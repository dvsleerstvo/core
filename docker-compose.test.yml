version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: dvsleerstvo_redis_home
    networks:
      - dvsleerstvo_home

  db:
    image: postgres:17-alpine
    container_name: dvsleerstvo_db_home
    environment:
      - POSTGRES_DB=dvsleerstvo
      - POSTGRES_USER=dvsleerstvo_user
      - POSTGRES_PASSWORD=dvsleerstvo_password
    networks:
      - dvsleerstvo_home

  # Бэкенд (Django)
  web:
    build: .
    container_name: dvsleerstvo_web_home
    volumes:
      - .:/app
      - /app/frontend/
      - static_volume:/app/staticfiles
    env_file:
      - .env
    depends_on:
      - redis
      - db
    networks:
      - dvsleerstvo_home
    command: uv run manage.py runserver 0.0.0.0:8000

  # Фронтенд (SvelteKit)
  frontend:
    image: node:20-slim
    container_name: dvsleerstvo_frontend_home
    working_dir: /app
    volumes:
      - ./frontend:/app
    env_file:
      - .env
    depends_on:
      - web
    networks:
      - dvsleerstvo_home
    command: /bin/sh -c "npm install && npm run dev -- --host 0.0.0.0"

  # Дискорд бот
  discord:
    build: ./discordbot
    container_name: dvsleerstvo_bot_home
    profiles:
      - bot
    volumes:
      - ./discordbot:/app
    env_file:
      - .env
    depends_on:
      - web
    networks:
      - dvsleerstvo_home

  # Прокси
  nginx:
    image: nginx:stable-alpine
    container_name: dvsleerstvo_nginx_home
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
    depends_on:
      - web
      - frontend
    networks:
      - dvsleerstvo_home

volumes:
  static_volume:

networks:
  dvsleerstvo_home:
    driver: bridge
